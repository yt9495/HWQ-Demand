<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemical Demand Dashboard 2026</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1>Chemical Demand Dashboard <span class="year">2026</span></h1>
      <div class="topbar-actions">
        <label class="upload-btn" for="fileInput">
          <span>엑셀 업로드 (Upload Excel)</span>
          <input type="file" id="fileInput" accept=".xlsx,.xls" hidden>
        </label>
        <span id="uploadStatus" class="upload-status"></span>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="kpiRow" class="kpi-row"></section>

    <section class="panel">
      <div class="panel-header">
        <h2>주간 Demand 테이블 (Weekly Demand Table)</h2>
        <div class="month-tabs" id="monthTabs"></div>
      </div>
      <div class="table-wrap">
        <table id="demandTable"></table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>화학물질별 주간 추이 (Trend by Chemical)</h2>
        <div id="chartLegend" class="chart-legend"></div>
      </div>
      <div class="chart-wrap">
        <canvas id="trendChart" role="img" aria-label="화학물질별 주간 Demand 추이 라인 차트"></canvas>
      </div>
    </section>

    <footer class="footer-note">
      <p>데이터 출처: 매주 업데이트되는 Chemical Demand Plan 엑셀. 새 파일을 업로드하면 대시보드가 즉시 갱신됩니다.
      Firebase 연동 후에는 업로드 시 자동으로 클라우드에 저장되어 팀원 누구나 최신 데이터를 볼 수 있습니다.</p>
    </footer>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase.js"></script>
  <script src="app.js"></script>
</body>
</html>
